              <p>风中你的样子</p>
<p>喜欢你站在风中的样子<br>
风过<br>
发散<br>
笑容 留在嘴边</p>
<p>那眉宇的频皱<br>
只为等我的焦急<br>
那眼里的不安<br>
只为等我的出现</p>
<p>我想裹足不前<br>
又不忍心看你落寞<br>
我想转过身去<br>
却舍不得不再相见</p>
<p>风中你的样子<br>
是我生存的标杆<br>
我要把它留下<br>
作一生的眷恋</p>
<p>于是<br>
我静静的走来<br>
拥抱<br>
爱恋</p>
