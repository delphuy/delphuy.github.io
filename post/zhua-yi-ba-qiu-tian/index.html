                                    <p>抓一把秋天<br>
结成心与梦的飞翔<br>
放下疲惫<br>
放下竞争<br>
放下不属于自己的我</p>
<!-- more -->
<p>看秋风红遍山林<br>
看落叶<br>
看石  看水<br>
看街头红红绿绿朦胧又奔放<br>
看夜空高而清幽<br>
看众生蚍蜉<br>
看见自己了么？</p>
<p>不用关门<br>
用冥想感悟天地<br>
用惬意体会生活<br>
春夏秋冬入我门来<br>
用手搅动出风雪雨雷<br>
用欢歌奏出灵动的季节</p>
<p>失去了春 失去了夏<br>
抓一把秋天吧<br>
莫要失去了自我</p>
