<p>铺展艳丽，接着铺展凋谢</p>

<p>门外的天空</p>
<p>悬挂着夏日炎炎</p>
<p>零乱飞舞的选择</p>
<p>模棱两可，或者亦步亦趋</p>

<p>我们至少得到了一点点</p>
<p>爱情的抽象</p>
