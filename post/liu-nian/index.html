              <p>再捧起当时的月亮<br>
多情的人儿<br>
素指拨弦<br>
又拨动了那经年的念想</p>
<!-- more -->
<p>谁的藤<br>
又趁了夜色悄悄<br>
爬满相思的墙<br>
明早该有多少花朵绽放</p>
<p>我仰着头不说话<br>
呼吸处<br>
垂落一些小心愿<br>
埋进那场大雪</p>
<p>尔后<br>
待雪过天青<br>
吹落漫天的星斗<br>
许那一颗最亮的流星<br>
捎走</p>
<p>不曾稍待<br>
是流年……</p>
